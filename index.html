        :root { 
            --neon-gold: #ffd700; 
            --neon-cyan: #00f5ff;

            -webkit-tap-highlight-color: transparent;
            position: relative;
        }

        body::before {
            content: '';

            inset: 0;

        @keyframes energyPulse { 0%, 100% { box-shadow: 0 0 60px rgba(34, 211, 238, 0.7); } 50% { box-shadow: 0 0 180px rgba(34, 211, 238, 1), 0 0 220px rgba(192, 38, 211, 0.8); } }

        @keyframes floatQuantum { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-22px) rotate(8deg); } }
        .float { animation: floatQuantum 3s ease-in-out infinite; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(50px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .fade-in-up { animation: fadeInUp 1s cubic-bezier(0.23, 1, 0.32, 1) forwards; }

        .hall-card, .game-card { transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1); transform-style: preserve-3d; }
        .hall-card:hover, .game-card:hover { transform: scale(1.08) translateY(-18px) rotateX(12deg) rotateY(12deg); box-shadow: 0 0 180px rgba(34, 211, 238, 0.95); }

        .analysis-card { background: linear-gradient(145deg, #0a0718, #1a1433); border: 4px solid #22d3ee; box-shadow: 0 0 100px rgba(34, 211, 238, 0.8); position: relative; overflow: hidden; }
        .analysis-card::before {
            content: '';
            position: absolute;
            inset: -6px;
            border: 4px solid transparent;
            background: linear-gradient(45deg, #00f5ff, #c026d3, #ffd700, #00f5ff) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            animation: holographicShimmer 2.2s linear infinite;
            z-index: -1;
        }
        @keyframes holographicShimmer { 0% { background-position: 0% 50%; } 50% { background-position: 200% 50%; } 100% { background-position: 0% 50%; } }

        .holo-ring { animation: holoRotateAdvanced 12s linear infinite; }
        @keyframes holoRotateAdvanced { from { transform: rotate(0deg) scale(1); } 50% { transform: rotate(180deg) scale(1.05); } to { transform: rotate(360deg) scale(1); } }

        .scanline::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(transparent 50%, rgba(0,245,255,0.2) 50%);

        #particle-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; opacity: 0.4; }
    </style>

// ====================== ADVANCED PARTICLE SYSTEM (NÂNG CAO) ======================
class QuantumParticle {
    constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.vx = (Math.random() - 0.5) * 2.2;
        this.vy = (Math.random() - 0.5) * 2.2;
        this.size = Math.random() * 3.8 + 1.2;
        this.hue = Math.random() * 360;
        this.life = 1;
        this.type = Math.random() > 0.7 ? 'orb' : (Math.random() > 0.5 ? 'spark' : 'dot'); // 3 loại particle
        this.glow = Math.random() * 15 + 8;
    }

    update(mouseX, mouseY, isRepelling) {
        // Mouse interaction mạnh mẽ
        const dx = mouseX - this.x;
        const dy = mouseY - this.y;
        const dist = Math.hypot(dx, dy) || 1;

        if (dist < 220) {
            const force = (220 - dist) / 220;
            if (isRepelling) {
                this.vx -= dx / dist * force * 4.5;
                this.vy -= dy / dist * force * 4.5;
            } else {
                this.vx += dx / dist * force * 2.8;
                this.vy += dy / dist * force * 2.8;
            }
        }

        // Velocity damping + quantum drift
        this.vx *= 0.965;
        this.vy *= 0.965;
        this.x += this.vx;
        this.y += this.vy;

        // Bounce edges
        if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
        if (this.y < 0 || this.y > canvas.height) this.vy *= -1;

        // Color shift (quantum energy)
        this.hue = (this.hue + 1.8) % 360;
        this.life = Math.max(0.3, this.life - 0.002);
    }

    draw(ctx) {
        ctx.save();
        const alpha = this.life * (this.type === 'orb' ? 0.95 : 0.75);
        ctx.globalAlpha = alpha;

        if (this.type === 'orb') {
            // Quantum orb glow
            ctx.shadowBlur = this.glow;
            ctx.shadowColor = `hsl(${this.hue}, 100%, 85%)`;
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size * 1.6, 0, Math.PI * 2);
            ctx.fill();
        } else if (this.type === 'spark') {
            // Spark line
            ctx.shadowBlur = 8;
            ctx.shadowColor = '#c026d3';
            ctx.strokeStyle = `hsl(${this.hue}, 100%, 90%)`;
            ctx.lineWidth = this.size * 0.8;
            ctx.beginPath();
            ctx.moveTo(this.x - this.vx * 3, this.y - this.vy * 3);
            ctx.lineTo(this.x, this.y);
            ctx.stroke();
        } else {
            // Normal dot
            ctx.shadowBlur = 12;
            ctx.shadowColor = '#00f5ff';
            ctx.fillStyle = `hsl(${this.hue}, 100%, 88%)`;
            ctx.fillRect(this.x - this.size / 2, this.y - this.size / 2, this.size, this.size);
        }
        ctx.restore();
    }
}

let canvas, ctx, particles = [], mouseX = 0, mouseY = 0, isRepelling = false;

function initAdvancedParticles() {
    canvas = document.getElementById('particle-bg');
    ctx = canvas.getContext('2d');

    const resize = () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    };
    window.addEventListener('resize', resize);
    resize();

    // Tạo 280 particles (rất mượt)
    particles = [];
    for (let i = 0; i < 280; i++) {
        particles.push(new QuantumParticle());
    }

    // Mouse tracking
    document.addEventListener('mousemove', e => {
        mouseX = e.clientX;
        mouseY = e.clientY;
    });

    // Click burst + hold to repel
    canvas.addEventListener('mousedown', e => {
        isRepelling = true;
        createEnergyBurst(e.clientX, e.clientY, 45);
    });
    canvas.addEventListener('mouseup', () => isRepelling = false);
    canvas.addEventListener('mouseleave', () => isRepelling = false);

    function animate() {
        // Trail effect (clear nhẹ)
        ctx.fillStyle = 'rgba(5, 5, 15, 0.12)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        particles.forEach((p, i) => {
            p.update(mouseX, mouseY, isRepelling);
            p.draw(ctx);

            // Neural connections (nâng cao)
            for (let j = i + 1; j < particles.length; j += 3) { // tối ưu hiệu suất
                const p2 = particles[j];
                const dx = p.x - p2.x;
                const dy = p.y - p2.y;
                const distance = Math.hypot(dx, dy);
                if (distance < 135 && distance > 8) {
                    ctx.save();
                    ctx.globalAlpha = (135 - distance) / 135 * 0.28;
                    ctx.strokeStyle = `hsl(${(p.hue + p2.hue) / 2}, 100%, 85%)`;
                    ctx.lineWidth = 0.9;
                    ctx.shadowBlur = 4;
                    ctx.shadowColor = '#00f5ff';
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.stroke();
                    ctx.restore();
                }
            }
        });

        // Occasional quantum pulse
        if (Math.random() < 0.018) {
            const centerX = Math.random() * canvas.width;
            const centerY = Math.random() * canvas.height;
            createEnergyBurst(centerX, centerY, 18);
        }

        requestAnimationFrame(animate);
    }
    animate();
}

function createEnergyBurst(x, y, count) {
    for (let i = 0; i < count; i++) {
        const p = new QuantumParticle();
        p.x = x;
        p.y = y;
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 7 + 3;
        p.vx = Math.cos(angle) * speed;
        p.vy = Math.sin(angle) * speed;
        p.life = 1.4;
        p.size = Math.random() * 4 + 2;
        particles.push(p);

        // Xóa particle cũ nếu quá nhiều
        if (particles.length > 420) particles.shift();
    }
}

// ====================== CÁC HÀM KHÁC (giữ nguyên) ======================
function countUp(element, target, suffix = '', duration = 1400) {
    let start = 0;
    const startTime = performance.now();
    function animate(time) {
        const elapsed = time - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const value = Math.floor(progress * target);
        element.textContent = value + suffix;
        if (progress < 1) requestAnimationFrame(animate);
        else element.textContent = target + suffix;
    }
    requestAnimationFrame(animate);
}

function triggerRandomGlitch() {
    const title = document.getElementById('main-title');
    if (title) {
        title.classList.remove('glitch');
        void title.offsetWidth;
        title.classList.add('glitch');
    }
}

function renderHalls() { /* ... giữ nguyên như phiên bản trước */ 
    const grid = document.getElementById('hall-grid');
    grid.innerHTML = '';
    halls.forEach((hall, index) => {
        const winRate = Math.floor(Math.random() * 15) + 83;
        const bigWinRate = Math.floor(Math.random() * 20) + 71;
        const div = document.createElement('div');
        div.className = `hall-card rounded-3xl p-8 cursor-pointer fade-in-up`;
        div.style.animationDelay = `${index * 80}ms`;
        div.innerHTML = `
            <div class="text-center mb-6">
                <h3 class="text-4xl font-bold neon-gold tracking-widest">${hall.name}</h3>
            </div>
            <div class="flex justify-center mb-10">
                <img src="${hall.img}" class="hall-logo" alt="${hall.name}">
            </div>
            <div class="space-y-7">
                <div>
                    <div class="flex justify-between text-sm mb-2 text-white/90">
                        <span>TỈ LỆ THẮNG</span>
                        <span class="font-bold text-emerald-400">${winRate}%</span>
                    </div>
                    <div class="ratio-bar"><div class="ratio-fill h-full bg-gradient-to-r from-emerald-400 to-cyan-400" style="width: ${winRate}%"></div></div>
                </div>
                <div>
                    <div class="flex justify-between text-sm mb-2 text-white/90">
                        <span>NỔ CỰC LỚN</span>
                        <span class="font-bold text-amber-400">${bigWinRate}%</span>
                    </div>
                    <div class="ratio-bar"><div class="ratio-fill h-full bg-gradient-to-r from-amber-400 to-yellow-400" style="width: ${bigWinRate}%"></div></div>
                </div>
            </div>
        `;
        div.onclick = () => selectHall(hall.id);
        grid.appendChild(div);
    });
}

function getRandomRecommended() { /* ... giữ nguyên */ 
    recommendedIndex = Math.floor(Math.random() * pgGames.length);
    const game = pgGames[recommendedIndex];
    const ratio = Math.floor(Math.random() * 22) + 78;
    document.getElementById('recommended-img').src = game.img;
    document.getElementById('recommended-name').textContent = game.name;
    document.getElementById('recommended-ratio').textContent = ratio + "%";
    const fill = document.getElementById('recommended-fill');
    fill.style.width = '0%';
    setTimeout(() => fill.style.width = ratio + '%', 300);
}

function showAnalysis(index) { /* ... giữ nguyên */ 
    const game = pgGames[index];
    document.getElementById('pg-screen').classList.add('hidden');
    document.getElementById('other-screen').classList.add('hidden');
    document.getElementById('analysis-screen').classList.remove('hidden');

    document.getElementById('game-title').textContent = game.name;
    document.getElementById('game-avatar-analysis').src = game.img;

    const prob = Math.floor(Math.random() * 11) + 89;
    const totalSpins = Math.floor(Math.random() * 90) + 55;
    const normalSpins = Math.floor(totalSpins * 0.62);
    const fastSpins = totalSpins - normalSpins;

    countUp(document.getElementById('win-prob-text'), prob, '%');
    countUp(document.getElementById('total-spins'), totalSpins);
    countUp(document.getElementById('normal-spins'), normalSpins);
    countUp(document.getElementById('fast-spins'), fastSpins);

    const probFill = document.getElementById('win-prob-fill');
    probFill.style.width = '0%';
    setTimeout(() => probFill.style.width = prob + '%', 400);

    const now = new Date();
    const future = new Date(now.getTime() + (Math.floor(Math.random() * 18) + 5) * 60000);
    document.getElementById('current-time').textContent = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    document.getElementById('golden-time').textContent = `${String(future.getHours()).padStart(2,'0')}:${String(future.getMinutes()).padStart(2,'0')}`;
}

function selectHall(hallId) { /* ... giữ nguyên */ 
    currentHall = hallId;
    document.getElementById('hall-screen').classList.add('hidden');
    if (hallId === "pg") {
        document.getElementById('pg-screen').classList.remove('hidden');
        initPGScreen();
    } else {
        document.getElementById('other-screen').classList.remove('hidden');
        const hall = halls.find(h => h.id === hallId);
        document.getElementById('current-hall-name').textContent = hall.name;
        document.getElementById('current-hall-logo').innerHTML = `<img src="${hall.img}" class="hall-logo">`;
    }
}

function backToHall() { /* ... giữ nguyên */ 
    document.getElementById('pg-screen').classList.add('hidden');
    document.getElementById('other-screen').classList.add('hidden');
    document.getElementById('analysis-screen').classList.add('hidden');
    document.getElementById('hall-screen').classList.remove('hidden');
}

function backToCurrentScreen() { /* ... giữ nguyên */ 
    document.getElementById('analysis-screen').classList.add('hidden');
    if (currentHall === "pg") document.getElementById('pg-screen').classList.remove('hidden');
    else document.getElementById('other-screen').classList.remove('hidden');
}

function initPGScreen() { /* ... giữ nguyên */ 
    getRandomRecommended();
    filteredGames = pgGames.slice();
    currentPage = 0;
    renderGamesPG();
    const searchInput = document.getElementById('search-input');
    searchInput.value = '';
    if (!searchListenerAdded) {
        searchInput.addEventListener('input', (e) => filterGamesPG(e.target.value));
        searchListenerAdded = true;
    }
}

function renderGamesPG() { /* ... giữ nguyên */ 
    const grid = document.getElementById('game-grid');
    grid.innerHTML = '';
    const start = currentPage * gamesPerPage;
    const end = start + gamesPerPage;
    const pageGames = filteredGames.slice(start, end);

    pageGames.forEach((game, index) => {
        const actualIndex = pgGames.indexOf(game);
        const ratio = Math.floor(Math.random() * 25) + 75;
        const div = document.createElement('div');
        div.className = `text-center cursor-pointer game-card fade-in-up`;
        div.style.animationDelay = `${index * 60}ms`;
        div.innerHTML = `
            <img src="${game.img}" class="game-img-large mx-auto w-full aspect-square object-contain rounded-2xl bg-black/40 p-4" alt="${game.name}">
            <p class="mt-4 text-sm font-bold neon-cyan px-2 line-clamp-2">${game.name}</p>
            <div class="mt-4 px-4">
                <div class="flex justify-between text-[10px] mb-1 text-white/70">
                    <span>NHẢ</span>
                    <span class="font-bold text-emerald-400">${ratio}%</span>
                </div>
                <div class="ratio-bar">
                    <div class="ratio-fill h-full bg-gradient-to-r from-emerald-400 to-cyan-400" style="width: ${ratio}%"></div>
                </div>
            </div>
        `;
        div.onclick = () => showAnalysis(actualIndex);
        grid.appendChild(div);
    });

    const totalPages = Math.ceil(filteredGames.length / gamesPerPage);
    document.getElementById('page-info').textContent = `Trang ${currentPage + 1}/${totalPages}`;
    renderPaginationPG(totalPages);
}

function renderPaginationPG(totalPages) { /* ... giữ nguyên */ 
    const container = document.getElementById('pagination');
    container.innerHTML = '';
    for (let i = 0; i < totalPages; i++) {
        const dot = document.createElement('div');
        dot.className = `w-3 h-3 rounded-full cursor-pointer transition-all ${i === currentPage ? 'bg-cyan-400 scale-125 shadow-cyan-400/60' : 'bg-cyan-400/30'}`;
        dot.onclick = () => { currentPage = i; renderGamesPG(); };
        container.appendChild(dot);
    }
}

function filterGamesPG(query) { /* ... giữ nguyên */ 
    query = query.toLowerCase().trim();
    filteredGames = pgGames.filter(game => game.name.toLowerCase().includes(query));
    currentPage = 0;
    renderGamesPG();
}

// ====================== INIT ======================
window.onload = () => {
    renderHalls();
    initAdvancedParticles();        // ← Particle System NÂNG CAO
    setInterval(triggerRandomGlitch, 3800);

    const recCard = document.getElementById('recommended-card');
    if (recCard) {
        recCard.style.opacity = '0';
        setTimeout(() => {
            recCard.style.transition = 'all 1.1s cubic-bezier(0.23,1,0.32,1)';
            recCard.style.opacity = '1';
        }, 600);
    }

    console.log('%c🚀 QUANTUM SẢNH 2049 – Hiệu ứng Particle NÂNG CAO đã kích hoạt!', 'color:#00f5ff; font-family:Orbitron; font-size:15px; text-shadow: 0 0 10px #00f5ff;');
};
</script>
