<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>QUANTUM SẢNH • NEURAL 2049</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@500;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-gold: #ffd700; 
            --neon-cyan: #00f5ff; 
            --neon-purple: #c026d3; 
        }
        body { 
            background: #05050f; 
            font-family: 'Inter', system-ui, sans-serif; 
            min-height: 100vh; 
            color: white; 
            overflow-x: hidden;
            background-image: 
                linear-gradient(rgba(0,245,255,0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(192,38,211,0.08) 1px, transparent 1px);
            background-size: 60px 60px;
            -webkit-tap-highlight-color: transparent;
        }
        .title-font { 
            font-family: 'Orbitron', sans-serif; 
            letter-spacing: 8px; 
        }
        .neon-gold { 
            color: var(--neon-gold); 
            text-shadow: 
                0 0 15px #ffd700,
                0 0 30px #ffd700,
                0 0 45px #c026d3,
                0 0 70px #00f5ff;
        }
        .neon-cyan { 
            color: var(--neon-cyan); 
            text-shadow: 
                0 0 20px #00f5ff,
                0 0 40px #00f5ff,
                0 0 60px #00f5ff,
                0 0 90px #00f5ff;
        }

        /* ==================== GLOBAL ANIMATIONS ==================== */
        @keyframes glitch {
            0% { text-shadow: 4px 0 #ff00ff, -4px 0 #00ffff; }
            100% { text-shadow: -4px 0 #ff00ff, 4px 0 #00ffff; }
        }
        .glitch { animation: glitch 0.8s linear infinite alternate; }

        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(200%); }
        }
        .scanline::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(transparent 50%, rgba(0,245,255,0.15) 50%);
            background-size: 100% 8px;
            animation: scan 3.5s linear infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 60px rgba(34, 211, 238, 0.6); }
            50% { box-shadow: 0 0 140px rgba(34, 211, 238, 1); }
        }
        .pulse-neon { animation: pulse-glow 1.8s ease-in-out infinite; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-18px); }
        }
        .float { animation: float 2.8s ease-in-out infinite; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in-up { animation: fadeInUp 0.9s ease forwards; }

        .hall-card {
            background: linear-gradient(145deg, #0f0a1f, #1c1333);
            border: 4px solid #22d3ee;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .hall-card:hover {
            transform: scale(1.09) translateY(-15px);
            box-shadow: 0 0 160px rgba(34, 211, 238, 0.95);
            border-color: #67e8f9;
        }

        .game-card {
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .game-card:hover {
            transform: scale(1.1) translateY(-10px);
            box-shadow: 0 0 80px rgba(34, 211, 238, 0.9);
        }

        .analysis-card {
            background: linear-gradient(145deg, #0a0718, #1a1433);
            border: 4px solid #22d3ee;
            box-shadow: 0 0 100px rgba(34, 211, 238, 0.8);
            position: relative;
            overflow: hidden;
        }
        .analysis-card::before {
            content: '';
            position: absolute;
            inset: -4px;
            border: 3px solid transparent;
            background: linear-gradient(45deg, #00f5ff, #c026d3, #00f5ff) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            animation: border-glow 2.5s linear infinite;
        }
        @keyframes border-glow { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }

        .holo-ring { animation: holo-rotate 15s linear infinite; }
        @keyframes holo-rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .ratio-bar {
            height: 10px;
            background: #1e2937;
            border-radius: 9999px;
            overflow: hidden;
            border: 2px solid rgba(34,211,238,0.5);
        }
        .ratio-fill {
            animation: fillBar 1s ease forwards;
        }

        /* Particle background */
        #particle-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: -1;
            opacity: 0.25;
        }
    </style>
</head>
<body class="pb-20 scanline">

<div class="max-w-[420px] mx-auto px-4 pt-6 relative z-10">

    <!-- HALL SELECTION -->
    <div id="hall-screen">
        <div class="text-center mb-12">
            <h1 class="title-font text-5xl neon-gold tracking-widest glitch">QUANTUM SẢNH</h1>
            <p class="text-cyan-400 mt-3 text-sm tracking-[5px] animate-pulse">NEURAL INTERFACE • 2049</p>
            <div class="h-px bg-gradient-to-r from-transparent via-cyan-400 to-transparent my-8"></div>
            <p class="text-white/70 text-xs tracking-widest">CHỌN CỔNG • HƠN 120 TRÒ CHƠI QUANTUM</p>
        </div>
        <div class="space-y-10" id="hall-grid"></div>
    </div>

    <!-- PG SCREEN -->
    <div id="pg-screen" class="hidden">
        <button onclick="backToHall()" class="mb-6 flex items-center gap-2 text-cyan-300 hover:text-white text-lg active:scale-95">← QUANTUM HUB</button>
        <h1 class="title-font text-4xl neon-gold text-center mb-8 glitch">SẢNH PG</h1>

        <!-- RECOMMENDED -->
        <div onclick="showAnalysis(recommendedIndex)" id="recommended-card" 
             class="cursor-pointer bg-gradient-to-br from-purple-950 to-violet-950 rounded-3xl p-6 border-4 border-yellow-400 shadow-2xl mb-10 float pulse-neon">
            <div class="text-center mb-4">
                <span class="text-yellow-400 text-xs font-bold tracking-widest">⭐ NEURAL RECOMMENDATION</span>
            </div>
            <div class="flex justify-center">
                <img id="recommended-img" class="game-img-large w-52 h-52 object-contain" alt="">
            </div>
            <p id="recommended-name" class="text-center mt-6 text-2xl font-bold neon-cyan"></p>
            <div class="mt-6">
                <div class="flex justify-between text-xs mb-2 text-white/80">
                    <span>TỈ LỆ NHẢ</span>
                    <span id="recommended-ratio" class="font-bold text-emerald-400">88%</span>
                </div>
                <div class="ratio-bar"><div id="recommended-fill" class="ratio-fill h-full bg-gradient-to-r from-emerald-400 to-cyan-400" style="width: 88%"></div></div>
            </div>
        </div>

        <div class="mb-6">
            <input id="search-input" type="text" placeholder="🔍 TÌM TRÒ CHƠI QUANTUM..." 
                   class="w-full px-6 py-4 rounded-2xl bg-[#0f172a] border-2 border-cyan-400 focus:border-cyan-300 text-white placeholder-gray-400 text-base">
        </div>

        <div class="flex justify-between items-center mb-5 px-1">
            <h2 class="text-xl font-bold neon-gold">CÁC TRÒ CHƠI KHÁC</h2>
            <div id="page-info" class="text-cyan-400 text-sm font-medium"></div>
        </div>

        <div id="game-grid" class="grid grid-cols-2 gap-6"></div>
        <div class="flex justify-center gap-3 mt-10" id="pagination"></div>

        <button onclick="backToHall()" 
                class="mt-12 w-full py-5 bg-gradient-to-r from-cyan-600 to-purple-600 rounded-3xl text-xl font-bold active:scale-95">
            ← QUAY VỀ QUANTUM HUB
        </button>
    </div>

    <!-- OTHER HALL -->
    <div id="other-screen" class="hidden">
        <button onclick="backToHall()" class="mb-8 flex items-center gap-2 text-cyan-300 hover:text-white active:scale-95">← QUAY VỀ QUANTUM HUB</button>
        <div class="text-center mt-20">
            <div id="current-hall-logo" class="mx-auto mb-8"></div>
            <div id="current-hall-name" class="title-font text-4xl neon-gold mb-4"></div>
            <p class="text-emerald-400 text-xl font-bold">ĐANG ĐỒNG BỘ HƠN 30 TRÒ CHƠI MỚI...</p>
        </div>
    </div>

    <!-- ANALYSIS SCREEN -->
    <div id="analysis-screen" class="hidden">
        <button onclick="backToCurrentScreen()" class="mb-6 flex items-center gap-2 text-cyan-300 hover:text-white text-lg active:scale-95">← QUAY LẠI</button>

        <div id="future-result" class="analysis-card rounded-3xl p-8 fade-in-up">
            <div class="text-center">
                <h1 id="game-title" class="title-font text-[28px] leading-tight neon-gold glitch"></h1>
                <div class="flex justify-center my-10 relative">
                    <img id="game-avatar-analysis" class="w-64 h-64 object-contain game-img-large rounded-3xl border-4 border-cyan-400 shadow-[0_0_100px_-10px_#00f5ff]" alt="">
                    <div class="holo-ring absolute -inset-14 border border-cyan-400/40 rounded-3xl"></div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-8 mb-12">
                <div class="text-center">
                    <p class="text-xs text-white/60 mb-3">XÁC SUẤT NỔ HŨ</p>
                    <p id="win-prob-text" class="text-6xl font-bold text-emerald-400"></p>
                    <div class="ratio-bar mt-5">
                        <div id="win-prob-fill" class="ratio-fill h-full bg-gradient-to-r from-emerald-400 to-cyan-400"></div>
                    </div>
                </div>
                <div class="text-center border-l border-cyan-400/30">
                    <p class="text-xs text-white/60 mb-3">GIỜ VÀNG QUANTUM</p>
                    <div class="flex items-center justify-center gap-4 text-2xl">
                        <span id="current-time" class="text-white/70 font-mono"></span>
                        <span class="text-cyan-400">→</span>
                        <span id="golden-time" class="neon-gold font-bold font-mono"></span>
                    </div>
                </div>
            </div>

            <div class="border-t border-cyan-400/30 pt-8">
                <h3 class="text-center text-purple-300 font-bold tracking-widest text-lg mb-6">⚡ SPIN PROTOCOL</h3>
                <div class="grid grid-cols-3 gap-6 text-center">
                    <div>
                        <p class="text-xs text-white/60">TỔNG VÒNG</p>
                        <p id="total-spins" class="text-5xl font-bold neon-cyan"></p>
                    </div>
                    <div>
                        <p class="text-xs text-white/60">QUAY THƯỜNG</p>
                        <p id="normal-spins" class="text-4xl font-semibold text-emerald-400"></p>
                    </div>
                    <div>
                        <p class="text-xs text-white/60">QUAY NHANH</p>
                        <p id="fast-spins" class="text-4xl font-semibold text-amber-400"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Particle Background Canvas -->
<canvas id="particle-bg" width="420" height="800"></canvas>

    { name: "CỬ ĐẠI THẦN BÍ", img: "https://i.ibb.co/TxwhnD0h/C-D-C-TH-N-B.avif" },
    { name: "Iguazu", img: "https://i.ibb.co/CKqNTTpN/I-C-NH-IGUAZU.avif" },
    { name: "GÁI TÀI CÁ MR. KHO BÁU", img: "https://i.ibb.co/nsn45ng2/GAI-T-I-C-A-MR-KHO-B-U.avif" },

    { name: "KỲ QUAN INCA", img: "https://i.ibb.co/dswcDcgh/K-QUAN-INCA.avif" },
    { name: "KHO BÁU ALIBABA", img: "https://i.ibb.co/q36zDXhG/KHO-B-U-ALIBABA.avif" },
    { name: "KHO BÁU GUARDIAN", img: "https://i.ibb.co/chyn3gLB/KHO-B-U-GUARDIAN.avif" },
    { name: "KHO BÁU HOÀNG GIA", img: "https://i.ibb.co/CK0VqvzV/KHO-BAU-HOANG-GIA.avif" },
    { name: "LOREN GIÀU CÓ", img: "https://i.ibb.co/v40hMctL/LO-REN-GIAU-CO.avif" },
    { name: "LONG SINH 2", img: "https://i.ibb.co/k6zRYnxc/LONG-SINH-2.avif" },
    { name: "MÓN NGON MIỆNG", img: "https://i.ibb.co/5X2jwjBd/M-N-NGON-MI-NG.avif" },
    { name: "NGỰA MAY MẮN", img: "https://i.ibb.co/0wyxGdx/NG-A-MAY-M-N.avif" },
    { name: "PHI VỤ CƯỚP TIỀN", img: "https://i.ibb.co/QFrfZZ97/PHI-VU-CUOP-TIEN.avif" },
    { name: "RỒNG MAY MẮN", img: "https://i.ibb.co/KpCdGpST/R-N-MAY-M-N.avif" },
    { name: "SOCOLA HÔN HỘ", img: "https://i.ibb.co/Dm5HxTY/SOCOLA-HO-N-H-O.avif" },
    { name: "SỰ NGỦ MƠ", img: "https://i.ibb.co/RknTPK4x/S-NG-O-M-NG.avif" },
    { name: "TIỀN THƯỞNG CƠ MỰC", img: "https://i.ibb.co/ptsRB9B/TI-N-TH-NG-C-M-P.avif" },
    { name: "THÁM HIỂM NẺO", img: "https://i.ibb.co/1YB3bSsx/TH-M-NG-N-H.avif" },
    { name: "THUẬT GIẢ KIM", img: "https://i.ibb.co/hJfwSSZd/THU-T-GI-KIM.avif" },
    { name: "TRUY TÌM KHO BÁU RỒNG", img: "https://i.ibb.co/xqBRK5v3/TRUY-T-M-KHO-B-U-R-NG.avif" },
    { name: "VƯƠNG QUỐC CHINH PHỤC", img: "https://i.ibb.co/TxJH9y44/V-NG-QU-C-CHINH-PH-C.avif" }
];

let pgGames = [...originalPGGames];
let currentHall = "pg";
let currentPage = 0;
const gamesPerPage = 10;
let filteredGames = pgGames.slice();
let recommendedIndex = 0;
let searchListenerAdded = false;

// ====================== RENDER HALLS ======================
function renderHalls() {
    const grid = document.getElementById('hall-grid');
    grid.innerHTML = '';
    halls.forEach((hall, index) => {
        const winRate = Math.floor(Math.random() * 15) + 83;
        const bigWinRate = Math.floor(Math.random() * 20) + 71;

        const div = document.createElement('div');
        div.className = `hall-card rounded-3xl p-8 cursor-pointer fade-in-up`;
        div.style.animationDelay = `${index * 100}ms`;
        div.innerHTML = `
            <div class="text-center mb-6">
                <h3 class="text-4xl font-bold neon-gold tracking-widest">${hall.name}</h3>
            </div>
            <div class="flex justify-center mb-10">
                <img src="${hall.img}" class="hall-logo" alt="${hall.name}">
            </div>
            <div class="space-y-7">
                <div>
                    <div class="flex justify-between text-sm mb-2 text-white/90">
                        <span>TỈ LỆ THẮNG</span>
                        <span class="font-bold text-emerald-400">${winRate}%</span>
                    </div>
                    <div class="ratio-bar"><div class="ratio-fill h-full bg-gradient-to-r from-emerald-400 to-cyan-400" style="width: ${winRate}%"></div></div>
                </div>
                <div>
                    <div class="flex justify-between text-sm mb-2 text-white/90">
                        <span>NỔ CỰC LỚN</span>
                        <span class="font-bold text-amber-400">${bigWinRate}%</span>
                    </div>
                    <div class="ratio-bar"><div class="ratio-fill h-full bg-gradient-to-r from-amber-400 to-yellow-400" style="width: ${bigWinRate}%"></div></div>
                </div>
            </div>
        `;
        div.onclick = () => selectHall(hall.id);
        grid.appendChild(div);
    });
}

// ====================== CÁC HÀM CÒN LẠI ======================
function selectHall(hallId) {
    currentHall = hallId;
    document.getElementById('hall-screen').classList.add('hidden');
    if (hallId === "pg") {
        document.getElementById('pg-screen').classList.remove('hidden');
        initPGScreen();
    } else {
        document.getElementById('other-screen').classList.remove('hidden');
        const hall = halls.find(h => h.id === hallId);
        document.getElementById('current-hall-name').textContent = hall.name;
        document.getElementById('current-hall-logo').innerHTML = `<img src="${hall.img}" class="hall-logo">`;
    }
}

function backToHall() {
    document.getElementById('pg-screen').classList.add('hidden');
    document.getElementById('other-screen').classList.add('hidden');
    document.getElementById('analysis-screen').classList.add('hidden');
    document.getElementById('hall-screen').classList.remove('hidden');
}

function backToCurrentScreen() {
    document.getElementById('analysis-screen').classList.add('hidden');
    if (currentHall === "pg") document.getElementById('pg-screen').classList.remove('hidden');
    else document.getElementById('other-screen').classList.remove('hidden');
}

function initPGScreen() {
    getRandomRecommended();
    filteredGames = pgGames.slice();
    currentPage = 0;
    renderGamesPG();

    const searchInput = document.getElementById('search-input');
    searchInput.value = '';
    if (!searchListenerAdded) {
        searchInput.addEventListener('input', (e) => filterGamesPG(e.target.value));
        searchListenerAdded = true;
    }
}

function getRandomRecommended() {
    recommendedIndex = Math.floor(Math.random() * pgGames.length);
    const game = pgGames[recommendedIndex];
    const ratio = Math.floor(Math.random() * 22) + 78;
    document.getElementById('recommended-img').src = game.img;
    document.getElementById('recommended-name').textContent = game.name;
    document.getElementById('recommended-ratio').textContent = ratio + "%";
    document.getElementById('recommended-fill').style.width = ratio + "%";
}

function renderGamesPG() {
    const grid = document.getElementById('game-grid');
    grid.innerHTML = '';
    const start = currentPage * gamesPerPage;
    const end = start + gamesPerPage;
    const pageGames = filteredGames.slice(start, end);

    pageGames.forEach((game, index) => {
        const actualIndex = pgGames.indexOf(game);
        const ratio = Math.floor(Math.random() * 25) + 75;
        const div = document.createElement('div');
        div.className = `text-center cursor-pointer game-card fade-in-up`;
        div.style.animationDelay = `${index * 80}ms`;
        div.innerHTML = `
            <img src="${game.img}" class="game-img-large mx-auto w-full aspect-square object-contain rounded-2xl bg-black/40 p-4" alt="${game.name}">
            <p class="mt-4 text-sm font-bold neon-cyan px-2 line-clamp-2">${game.name}</p>
            <div class="mt-4 px-4">
                <div class="flex justify-between text-[10px] mb-1 text-white/70">
                    <span>NHẢ</span>
                    <span class="font-bold text-emerald-400">${ratio}%</span>
                </div>
                <div class="ratio-bar">
                    <div class="ratio-fill h-full bg-gradient-to-r from-emerald-400 to-cyan-400" style="width: ${ratio}%"></div>
                </div>
            </div>
        `;
        div.onclick = () => showAnalysis(actualIndex);
        grid.appendChild(div);
    });

    const totalPages = Math.ceil(filteredGames.length / gamesPerPage);
    document.getElementById('page-info').textContent = `Trang ${currentPage + 1}/${totalPages}`;
    renderPaginationPG(totalPages);
}

function renderPaginationPG(totalPages) {
    const container = document.getElementById('pagination');
    container.innerHTML = '';
    for (let i = 0; i < totalPages; i++) {
        const dot = document.createElement('div');
        dot.className = `w-3 h-3 rounded-full cursor-pointer transition-all ${i === currentPage ? 'bg-cyan-400 scale-125 shadow-cyan-400/60' : 'bg-cyan-400/30'}`;
        dot.onclick = () => { currentPage = i; renderGamesPG(); };
        container.appendChild(dot);
    }
}

function filterGamesPG(query) {
    query = query.toLowerCase().trim();
    filteredGames = pgGames.filter(game => game.name.toLowerCase().includes(query));
    currentPage = 0;
    renderGamesPG();
}

function showAnalysis(index) {
    const game = pgGames[index];
    document.getElementById('pg-screen').classList.add('hidden');
    document.getElementById('other-screen').classList.add('hidden');
    document.getElementById('analysis-screen').classList.remove('hidden');

    document.getElementById('game-title').textContent = game.name;
    document.getElementById('game-avatar-analysis').src = game.img;

    const prob = Math.floor(Math.random() * 11) + 89;
    document.getElementById('win-prob-text').textContent = prob + "%";
    document.getElementById('win-prob-fill').style.width = prob + "%";

    const totalSpins = Math.floor(Math.random() * 90) + 55;
    const normalSpins = Math.floor(totalSpins * 0.62);
    const fastSpins = totalSpins - normalSpins;

    document.getElementById('total-spins').textContent = totalSpins;
    document.getElementById('normal-spins').textContent = normalSpins;
    document.getElementById('fast-spins').textContent = fastSpins;

    const now = new Date();
    const future = new Date(now.getTime() + (Math.floor(Math.random() * 18) + 5) * 60000);
    document.getElementById('current-time').textContent = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    document.getElementById('golden-time').textContent = `${String(future.getHours()).padStart(2,'0')}:${String(future.getMinutes()).padStart(2,'0')}`;
}

// ====================== INIT ======================
window.onload = () => {
    renderHalls();

    // Particle background (subtle neon dots)
    const bgCanvas = document.getElementById('particle-bg');
    const bgCtx = bgCanvas.getContext('2d');
    bgCanvas.width = window.innerWidth;
    bgCanvas.height = window.innerHeight;

    const particles = [];
    for (let i = 0; i < 60; i++) {
        particles.push({
            x: Math.random() * bgCanvas.width,
            y: Math.random() * bgCanvas.height,
            size: Math.random() * 3 + 1,
            speed: Math.random() * 0.8 + 0.3
        });
    }

    function drawParticles() {
        bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
        bgCtx.fillStyle = '#00f5ff';
        particles.forEach(p => {
            bgCtx.globalAlpha = Math.random() * 0.6 + 0.4;
            bgCtx.fillRect(p.x, p.y, p.size, p.size);
            p.y += p.speed;
            if (p.y > bgCanvas.height) p.y = 0;
        });
        requestAnimationFrame(drawParticles);
    }
    drawParticles();
};
</script>
</body>
